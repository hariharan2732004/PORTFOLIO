<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <clipPath id="cc">
      <polygon points="0,0 80,0 100,20 100,100 0,100"/>
    </clipPath>
  </defs>

  <!-- Shadow base -->
  <rect width="100" height="100" fill="#020202"/>

  <!-- Main face — cut corner shape -->
  <polygon points="0,0 80,0 100,20 100,100 0,100" fill="#0c0c0c"/>

  <!-- Inner subtle border -->
  <polygon points="2,2 79,2 98,21 98,98 2,98" fill="none" stroke="#1c1c1c" stroke-width="1"/>

  <!-- Orange top accent bar (stops at cut) -->
  <rect x="0" y="0" width="80" height="3.5" fill="#e8610a"/>

  <!-- Left orange thin strip -->
  <rect x="0" y="0" width="3.5" height="100" fill="#1a1a1a"/>

  <!-- Cut corner diagonal accent -->
  <line x1="80" y1="0" x2="100" y2="20" stroke="#e8610a" stroke-width="1.8" opacity="0.9"/>

  <!-- H letter — Left vertical bar (white) -->
  <rect x="14" y="20" width="20" height="63" fill="#f0f0f0" rx="1"/>

  <!-- H letter — Right vertical bar (white) -->
  <rect x="66" y="20" width="20" height="63" fill="#f0f0f0" rx="1"/>

  <!-- H letter — Crossbar (pure orange) -->
  <rect x="14" y="41.5" width="72" height="15" fill="#e8610a"/>

  <!-- Tiny orange pixel top-left -->
  <rect x="0" y="0" width="4" height="4" fill="#e8610a"/>

  <!-- Yellow accent square (bottom-right) -->
  <rect x="82" y="79" width="9" height="9" fill="#f5c53b"/>
</svg>
